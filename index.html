    <style>
        :root {
            --primary: #3B82F6;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --bg-main: #F8FAFC;
        }

        /* Responsive Scaling for Large Monitors */
        html { font-size: 14px; }
        @media (min-width: 1024px) { html { font-size: 15px; } }
        @media (min-width: 1440px) { html { font-size: 16px; } }
        @media (min-width: 1920px) { html { font-size: 18px; } }
        @media (min-width: 2560px) { html { font-size: 21px; } }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0;
            overflow: hidden;
            color: #1e293b;
        }

        .rounded-custom { border-radius: 0.5rem; }
        .rounded-panel { border-radius: 0.75rem; }

        .search-container {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 200px;
        }
        .search-container:focus-within {
            width: 320px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .sidebar-item-active { background-color: #eff6ff; color: var(--primary); font-weight: 600; }
        
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #e2e8f0; border: 2px dashed #94a3b8;}
        
        /* Pulse Animation for Voice Dictation */
        @keyframes pulse-mic {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-listening { animation: pulse-mic 1.5s infinite; color: #ef4444; }

        /* Toast Animation */
        .toast-enter-active, .toast-leave-active { transition: all 0.3s ease; }
        .toast-enter-from, .toast-leave-to { opacity: 0; transform: translateY(20px) scale(0.95); }

        [v-cloak] { display: none; }
    </style>
